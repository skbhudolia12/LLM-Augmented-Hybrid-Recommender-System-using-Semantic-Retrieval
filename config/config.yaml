# ============================================================
# I2P-BERT Hybrid Recommendation Pipeline — Implicit Feedback
# ============================================================

project:
  name: "I2P-BERT-Implicit"
  seed: 42
  device: "cuda"

data:
  dataset: "ml-1m"
  raw_dir: "data/raw/ml-1m"
  processed_dir: "data/processed"
  test_negatives: 99    # Number of negatives per user for testing
  # Optional: TMDB
  tmdb_api_key: ""
  tmdb_cache_path: "data/raw/tmdb_cache.json"

item_encoder:
  model_name: "all-MiniLM-L6-v2"
  embedding_dim: 384
  vector_db_path: "data/vector_db"
  batch_size: 512

user_encoder:
  model_name: "bert-base-uncased"
  hidden_dim: 768
  num_genres: 18
  num_eras: 4
  num_activity_levels: 3
  epochs: 20
  batch_size: 128
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  dropout: 0.1
  loss_weights:
    genre_affinity: 1.0
    activity_level: 0.5
    preference_era: 0.5
    rating_tendency: 0.0 # Unused in implicit
  db_path: "data/user_profiles.db"

mlp:
  gmf_dim: 32
  mlp_dim: 32
  epochs: 40
  batch_size: 256
  train_negatives: 8
  learning_rate: 5.0e-4
  weight_decay: 0.01

slm:
  model_name: "microsoft/Phi-3-mini-4k-instruct"
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  epochs: 2
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  max_seq_length: 256
  max_train_samples: 5000    # Extremely fast training for deadline
  max_eval_users: 200        # Evaluate on small subset 
  epochs: 1                  # One epoch is enough for LoRA convergence
  attn_implementation: "eager"
